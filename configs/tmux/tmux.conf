# Prefijo más cómodo: Ctrl+a (en vez del default Ctrl+b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Numeración desde 1 (más intuitivo que 0)
set -g base-index 1
setw -g pane-base-index 1

# Mouse activo — scroll, click para cambiar panel/ventana
set -g mouse on

# Historial largo
set -g history-limit 10000

# Barra de estado
set -g status-style bg=colour235,fg=colour136
set -g status-left "#[fg=green][#S] "
set -g status-right "#[fg=cyan]%H:%M %d-%b"
set -g status-interval 60

# Rename de ventana automático
setw -g automatic-rename on

# Atajos intuitivos para splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navegar paneles con Alt+flechas (sin prefijo)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Clipboard OSC 52 — permite copiar hacia el portapapeles del cliente vía SSH
set -s set-clipboard on

# Recargar config sin reiniciar
bind r source-file ~/.tmux.conf \; display "Config recargada"
