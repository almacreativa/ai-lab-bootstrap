# Prefijo más cómodo: Ctrl+a (en vez del default Ctrl+b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Numeración desde 1 (más intuitivo que 0)
set -g base-index 1
setw -g pane-base-index 1

# Shell por defecto: bash login (evita el prompt $ pelado de /bin/sh)
set -g default-shell /bin/bash
set -g default-command "bash --login"

# Mouse activo — scroll, click para cambiar panel/ventana
set -g mouse on

# Historial largo
set -g history-limit 10000

# Barra de estado
set -g status-style bg=colour235,fg=colour136
set -g status-left "#[fg=green][#S] "
set -g status-right "#[fg=cyan]%H:%M %d-%b"
set -g status-interval 60

# Rename de ventana automático
setw -g automatic-rename on

# Atajos intuitivos para splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navegar paneles con Alt+flechas (sin prefijo)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Clipboard OSC 52 — permite copiar hacia el portapapeles del cliente vía SSH
set -s set-clipboard on

# Recargar config sin reiniciar
bind r source-file ~/.tmux.conf \; display "Config recargada"

# --- Persistencia de sesiones ---
set -g @resurrect-dir '~/.tmux/resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'ssh mosh-client htop top tail less'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# Plugins (continuum DEBE ser el último para no romper status-right)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'timvw/tmux-assistant-resurrect'

# Continuum: auto-save cada 15 min + auto-restore al iniciar
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Inicializar TPM (SIEMPRE al final del archivo)
run '~/.tmux/plugins/tpm/tpm'
